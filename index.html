<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05070f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="Tripod — build your sci-fi podtown. Match 3, merge, and expand into a galactic fortress."
    />
    <title>Tripod — Podtown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070f;
        /* iOS: fill safe areas */
        height: 100dvh;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      @media (pointer: fine) {
        body {
          cursor: url(./cursor.png) 10 10, auto;
        }
      }
      #game-container {
        width: 100%;
        height: 100%;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* notch / home indicator breathing room is handled by FIT letterboxing */
        padding:
          env(safe-area-inset-top, 0)
          env(safe-area-inset-right, 0)
          env(safe-area-inset-bottom, 0)
          env(safe-area-inset-left, 0);
        touch-action: none;
      }
      #game-container canvas {
        display: block;
        image-rendering: auto;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
